
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-cyan: #00f5ff;
    --neon-purple: #bf00ff;
    --neon-orange: #ff6b00;
    --neon-yellow: #ffd700;
    --dark-bg: #060a1a;
    --dark-card: #0d1530;
    --dark-card2: #111b3a;
    --border-glow: #1a3a6e;
    --text-bright: #e8f4ff;
    --text-dim: #7a9cc4;
    --gold: #ffd700;
    --silver: #c0c8d8;
    --bronze: #cd7f32;
  }

  #app {
    font-family: 'Inter', sans-serif;
    background: var(--dark-bg);
    min-height: 600px;
    color: var(--text-bright);
    position: relative;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;

      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .bg-glow {
    position: absolute; pointer-events: none; z-index: 0; border-radius: 50%;
    filter: blur(80px); opacity: 0.12;
  }

  .content { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, #0a1020 0%, rgba(6,10,26,0) 100%);
    border-bottom: 1px solid rgba(0,245,255,0.15);

    display: flex; align-items: center; justify-content: space-between;
  }

  .logo-group { display: flex; align-items: center; gap: 10px; }

  .logo-svg { width: 44px; height: 44px; flex-shrink: 0; }

  .logo-text { line-height: 1.1; }
  .logo-text .title { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 900; color: var(--neon-cyan); letter-spacing: 1px; }
  .logo-text .sub { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

  .header-center { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }

  .login-btn {
    background: transparent; border: 1px solid rgba(0,245,255,0.4); color: var(--neon-cyan);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 11px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .login-btn:hover { background: rgba(0,245,255,0.1); border-color: var(--neon-cyan); }

  .admin-badge {
    display: flex; align-items: center; gap: 8px;
  }
  .admin-name { font-size: 11px; color: var(--neon-cyan); font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px; }
  .logout-btn {
    background: transparent; border: 1px solid rgba(255,107,0,0.4); color: var(--neon-orange);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 10px;

  }

  /* MAIN TITLE */
  .main-title {
    text-align: center; padding: 20px 20px 10px;
  }
  .game-tag { font-size: 10px; color: var(--neon-orange); letter-spacing: 4px; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; font-weight: 600; margin-bottom: 6px; }

  .title-line { width: 200px; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); margin: 10px auto 0; }

  /* TOP 3 PODIUM */

  .podium-row {
    display: grid;

  .podium-card {

  .podium-card.rank-1 {
    background: linear-gradient(180deg, #1a1500 0%, #0d0f20 100%);

  .podium-card.rank-2 {

    border-color: rgba(192,200,216,0.4);
    padding: 14px 12px 14px;
  }
  .podium-card.rank-3 {
    background: linear-gradient(180deg, #120e07 0%, #080d1c 100%);
    border-color: rgba(205,127,50,0.4);
    padding: 14px 12px 14px;
  }

  .crown { font-size: 22px; margin-bottom: 4px; display: block; }

  .rank-badge {

  .rank-2 .rank-badge { background: rgba(192,200,216,0.15); color: var(--silver); border: 1px solid rgba(192,200,216,0.4); }
  .rank-3 .rank-badge { background: rgba(205,127,50,0.15); color: var(--bronze); border: 1px solid rgba(205,127,50,0.4); }

  .player-avatar {

    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-weight: 900; font-size: 16px;

  .rank-2 .player-avatar { background: rgba(192,200,216,0.15); border: 2px solid var(--silver); color: var(--silver); }

  .player-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 2px; }

  .rank-2 .player-score { font-size: 17px; color: var(--silver); }

  /* RANK 4-10 TABLE */

  .table-header {

  .table-header h3 { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .table-divider { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,245,255,0.2), transparent); }

  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table tr { border-bottom: 1px solid rgba(0,245,255,0.06); transition: background 0.15s; }
  .rank-table tr:hover td { background: rgba(0,245,255,0.03); }
  .rank-table td { padding: 9px 10px; font-size: 13px; }
  .rank-table td:first-child { width: 36px; }
  .rank-table td:last-child { text-align: right; }

  .rank-num { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; color: var(--text-dim); }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;

  .login-card {

  .login-logo .brand { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 900; color: var(--neon-cyan); }

  .add-form { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px; align-items: end; }
  .add-form .field-group { margin-bottom: 0; }
  .add-form .field-group input { padding: 7px 10px; font-size: 12px; }
  .add-form .field-group label { font-size: 9px; }
  .add-btn {
    height: 34px; padding: 0 14px; background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(0,245,255,0.05));
    border: 1px solid rgba(0,245,255,0.4); color: var(--neon-cyan);
    border-radius: 6px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;

  .add-btn:hover { background: rgba(0,245,255,0.2); }

  .form-err { color: #ff5555; font-size: 10px; margin-top: 6px; min-height: 14px; }

  /* CONFIRM DIALOG */
  .confirm-dialog {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .confirm-box {
    background: var(--dark-card); border: 1px solid rgba(255,107,0,0.4);

  .confirm-box p { font-size: 12px; color: var(--text-dim); margin-bottom: 18px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-yes { flex: 1; padding: 9px; background: rgba(255,107,0,0.15); border: 1px solid rgba(255,107,0,0.5); color: var(--neon-orange); border-radius: 6px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px; }
  .confirm-no { flex: 1; padding: 9px; background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.2); color: var(--text-dim); border-radius: 6px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,245,255,0.15); border: 1px solid rgba(0,245,255,0.4);
    color: var(--neon-cyan); padding: 10px 20px; border-radius: 8px; font-size: 12px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px;
    z-index: 300; transition: opacity 0.4s; pointer-events: none;

</style>

<script>
const CREDS = { u: 'UKMESPORT4.0', p: 'ESPORT4.0GELEX' };
let isAdmin = false;
let entries = [];

async function loadData() {
  try {
    const r = await window.storage.get('leaderboard_entries', true);
    if (r && r.value) entries = JSON.parse(r.value);
  } catch(e) { entries = []; }
  render();
}

async function saveData() {
  try {
    await window.storage.set('leaderboard_entries', JSON.stringify(entries), true);
  } catch(e) {}
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function render() {
  const sorted = [...entries].sort((a,b) => b.score - a.score).slice(0,10);
  renderPodium(sorted);
  renderTable(sorted);
}

function renderPodium(sorted) {
  const slots = [sorted[1], sorted[0], sorted[2]];
  const ranks = [2, 1, 3];
  const crowns = ['', '👑', ''];
  const colors = ['var(--silver)', 'var(--gold)', 'var(--bronze)'];
  const html = slots.map((p, i) => {
    const rank = ranks[i];
    const color = colors[i];
    if (!p) return `<div class="podium-card rank-${rank} empty-slot">
      <span class="rank-badge">#${rank}</span>
      <div class="player-avatar" style="opacity:0.3">?</div>
      <div class="player-name">Belum ada</div>
      <div class="player-prodi">—</div>
      <div class="player-score" style="color:var(--text-dim);font-size:13px">—</div>
      <div class="score-label">skor</div>
    </div>`;
    return `<div class="podium-card rank-${rank}">
      ${crowns[i] ? `<span class="crown">${crowns[i]}</span>` : ''}
      <div style="margin-bottom:4px"><span class="rank-badge">#${rank}</span></div>
      <div class="player-avatar">${initials(p.name)}</div>
      <div class="player-name">${esc(p.name)}</div>
      <div class="player-prodi">${esc(p.prodi)}</div>
      <div class="player-score">${p.score.toLocaleString()}</div>
      <div class="score-label">skor</div>
    </div>`;
  });
  document.getElementById('podiumRow').innerHTML = html.join('');
}

function renderTable(sorted) {
  const rows4to10 = [];
  for (let i = 3; i < 10; i++) {
    const p = sorted[i];
    const rank = i + 1;
    if (!p) {
      rows4to10.push(`<tr class="empty-row"><td><span class="rank-num">#${rank}</span></td><td colspan="2"><span style="color:var(--text-dim);font-size:11px">Slot kosong</span></td><td><span class="tscore" style="color:var(--text-dim)">—</span></td></tr>`);
    } else {
      rows4to10.push(`<tr>
        <td><span class="rank-num">#${rank}</span></td>
        <td>
          <div class="tname">${esc(p.name)}</div>
          <div class="tprodi">${esc(p.prodi)}</div>
        </td>
        <td></td>
        <td><span class="tscore">${p.score.toLocaleString()}</span></td>
      </tr>`);
    }
  }
  document.getElementById('rankTable').innerHTML = rows4to10.join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showLogin() { document.getElementById('loginOverlay').style.display='flex'; document.getElementById('loginErr').textContent=''; }
function hideLogin() { document.getElementById('loginOverlay').style.display='none'; }

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === CREDS.u && p === CREDS.p) {
    isAdmin = true;
    hideLogin();
    document.getElementById('headerRight').innerHTML = `<div class="admin-badge"><span class="admin-name"><i class="ti ti-shield-check" style="font-size:12px;margin-right:4px;vertical-align:-1px" aria-hidden="true"></i>ADMIN</span><button class="logout-btn" onclick="doLogout()">Keluar</button></div>`;
    document.getElementById('adminPanel').style.display='block';
    showToast('Login berhasil! Selamat datang, Admin.');
  } else {
    document.getElementById('loginErr').textContent = 'Username atau password salah.';
  }
}

function doLogout() {
  isAdmin = false;
  document.getElementById('headerRight').innerHTML = `<button class="login-btn" onclick="showLogin()"><i class="ti ti-lock" style="font-size:12px;margin-right:4px" aria-hidden="true"></i>Admin</button>`;
  document.getElementById('adminPanel').style.display='none';
}

function addEntry() {
  const name = document.getElementById('inName').value.trim();
  const prodi = document.getElementById('inProdi').value.trim();
  const scoreVal = document.getElementById('inScore').value.trim();
  const errEl = document.getElementById('formErr');
  if (!name) { errEl.textContent = 'Nama pemain wajib diisi.'; return; }
  if (!prodi) { errEl.textContent = 'Program studi wajib diisi.'; return; }
  if (!scoreVal || isNaN(Number(scoreVal)) || Number(scoreVal) < 0) { errEl.textContent = 'Masukkan skor yang valid.'; return; }
  errEl.textContent = '';
  const score = Math.round(Number(scoreVal));
  const existing = entries.findIndex(e => e.name.toLowerCase() === name.toLowerCase());
  if (existing >= 0) {
    if (score > entries[existing].score) {
      entries[existing].score = score;
      entries[existing].prodi = prodi;
      showToast(`Skor ${name} diperbarui!`);
    } else {
      showToast(`Skor ${name} tidak berubah (skor baru lebih rendah).`);
    }
  } else {
    entries.push({ name, prodi, score });
    showToast(`${name} ditambahkan ke leaderboard!`);
  }
  document.getElementById('inName').value='';
  document.getElementById('inProdi').value='';
  document.getElementById('inScore').value='';
  saveData();
  render();
}

function askReset() { document.getElementById('confirmDialog').style.display='flex'; }
function hideConfirm() { document.getElementById('confirmDialog').style.display='none'; }
function doReset() {
  entries = [];
  saveData();
  render();
  hideConfirm();
  showToast('Leaderboard berhasil direset!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.style.display='none', 400); }, 2500);
}

loadData();
</script>
